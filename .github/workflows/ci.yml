name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests and build plugin jar
        run: ./gradlew --no-daemon test fatJar

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-bot-weibo
          path: build/libs/*-all.jar
          if-no-files-found: error

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: dynamic-bot-weibo
          path: release

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          cd release
          jar_file="$(ls *-all.jar)"
          sha256sum "$jar_file" > "$jar_file.sha256"

      - name: Check tag matches project version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' build.gradle.kts | head -n 1)"
          if [[ -z "$project_version" ]]; then
            echo "Cannot find project version in build.gradle.kts"
            exit 1
          fi
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag version $tag_version does not match project version $project_version"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: dynamic-bot-weibo ${{ github.ref_name }}
          files: |
            release/*-all.jar
            release/*-all.jar.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
